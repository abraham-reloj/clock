<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Reloj</title>

<style>

body{
margin:0;
height:100vh;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
}

#clock{
font-size:80px;
font-weight:bold;
margin-bottom:40px;
text-align:center;
}

#controls{
position:fixed;
bottom:20px;
}

button{
font-size:18px;
padding:8px 14px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="clock"></div>

<div id="controls">
<button onclick="toggleTheme()">Tema</button>
<button onclick="changeSize(-10)">-</button>
<button onclick="changeSize(10)">+</button>
<button onclick="changeFont()">Fuente</button>
</div>

<script>

var fontSize = 80;

var fonts = [
"Arial",
"Courier New",
"Times New Roman",
"Verdana",
"monospace"
];

var fontIndex = 0;

function updateClock(){

var now = new Date();

var h = now.getHours();
var m = now.getMinutes();
var s = now.getSeconds();

var ampm = h >= 12 ? "PM" : "AM";

h = h % 12;
h = h ? h : 12;

if(m < 10) m = "0" + m;
if(s < 10) s = "0" + s;

document.getElementById("clock").innerHTML =
h + ":" + m + ":" + s + " " + ampm;

}

function toggleTheme(){

if(document.body.style.background == "white"){

document.body.style.background = "black";
document.body.style.color = "white";

}else{

document.body.style.background = "white";
document.body.style.color = "black";

}

}

function changeSize(v){

fontSize += v;

if(fontSize < 30) fontSize = 30;

document.getElementById("clock").style.fontSize =
fontSize + "px";

}

function changeFont(){

fontIndex++;

if(fontIndex >= fonts.length) fontIndex = 0;

document.getElementById("clock").style.fontFamily =
fonts[fontIndex];

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
